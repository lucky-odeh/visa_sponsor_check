name: Monthly Sponsor List Sync

on:
  # Runs at 6:00 AM UTC on the 1st of every month
  schedule:
    - cron: '0 6 1 * *'

  # Also allows you to trigger it manually from GitHub
  workflow_dispatch:
    inputs:
      csv_url:
        description: 'Override CSV URL (leave blank to auto-find latest)'
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Find latest Home Office sponsor CSV
        id: find-csv
        run: |
          # If a manual URL was provided, use it
          if [ -n "${{ github.event.inputs.csv_url }}" ]; then
            echo "csv_url=${{ github.event.inputs.csv_url }}" >> $GITHUB_OUTPUT
            echo "Using manual URL: ${{ github.event.inputs.csv_url }}"
            exit 0
          fi

          # Auto-find the latest CSV from the Home Office page
          echo "Searching for latest CSV on gov.uk..."
          PAGE=$(curl -s "https://www.gov.uk/government/publications/register-of-licensed-sponsors-workers")

          # Extract the CSV URL — Home Office always uses assets.publishing.service.gov.uk
          CSV_URL=$(echo "$PAGE" | grep -oP 'https://assets\.publishing\.service\.gov\.uk[^"]+Worker[^"]+\.csv' | head -1)

          if [ -z "$CSV_URL" ]; then
            echo "❌ Could not find CSV URL on gov.uk page"
            exit 1
          fi

          echo "✅ Found CSV: $CSV_URL"
          echo "csv_url=$CSV_URL" >> $GITHUB_OUTPUT

      - name: Trigger sync on Railway server
        run: |
          CSV_URL="${{ steps.find-csv.outputs.csv_url }}"
          echo "Triggering sync with: $CSV_URL"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ secrets.RAILWAY_URL }}/sync-sponsors" \
            -H "Content-Type: application/json" \
            -H "x-sync-secret: ${{ secrets.SYNC_SECRET }}" \
            -d "{\"csv_url\": \"$CSV_URL\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Sync failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "✅ Sync triggered successfully"

      - name: Wait and verify sponsor count
        run: |
          # Wait 3 minutes for the sync to complete (90,000 rows takes ~2 min)
          echo "Waiting 3 minutes for sync to complete..."
          sleep 180

          # Check the stats endpoint to confirm data was loaded
          STATS=$(curl -s "${{ secrets.RAILWAY_URL }}/stats")
          echo "Stats: $STATS"

          TOTAL=$(echo $STATS | grep -oP '"total_sponsors":\K[0-9]+')
          echo "Total sponsors after sync: $TOTAL"

          if [ -z "$TOTAL" ] || [ "$TOTAL" -lt "1000" ]; then
            echo "❌ Sponsor count looks too low: $TOTAL"
            exit 1
          fi

          echo "✅ Sync verified: $TOTAL sponsors loaded"
